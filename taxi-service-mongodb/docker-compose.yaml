services:
  mongodb:
    image: mongo:6
    container_name: taxi-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: taxi_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxi-network
    restart: unless-stopped

  taxi-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WORKER_THREADS=4
      - WORKER_FS_THREADS=2
      - SERVER_PORT=8080
      - LOGGER_LEVEL=info
    volumes:
      - ./configs:/app/configs:ro
      - ./openapi.yaml:/app/openapi.yaml:ro
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - taxi-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  taxi-network:
    driver: bridge